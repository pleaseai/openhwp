<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Defense-in-depth CSP. `'unsafe-inline'` + `'wasm-unsafe-eval'` in script-src
      are required by the inline import map and the rhwp WASM engine; esm.sh is the
      pinned CDN. connect-src/img-src are tightened to limit exfiltration should a
      malicious document ever inject active SVG content. TODO: once @rhwp is
      vendored locally, drop esm.sh + `'unsafe-inline'` and tighten to `'self'`.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://esm.sh 'unsafe-inline' 'wasm-unsafe-eval'; connect-src 'self' https://esm.sh; img-src 'self' data:; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenHWP</title>
    <link rel="stylesheet" href="./styles.css" />
    <!--
      The rhwp document engine (@rhwp/core) is an npm ESM package with a WASM
      payload. Until it is vendored/bundled for offline use it is loaded from a
      CDN via this import map; the CEF (Chromium) backend supports import maps.
      Versions are pinned (not floating) so the exact JS + WASM served is
      reproducible. TODO: vendor @rhwp/core + rhwp_bg.wasm locally so the app
      works offline and drops the third-party CDN from the runtime trust path.
    -->
    <script type="importmap">
    {
      "imports": {
        "@rhwp/core": "https://esm.sh/@rhwp/core@0.7.19",
        "@rhwp/editor": "https://esm.sh/@rhwp/editor@0.7.19"
      }
    }
    </script>
  </head>
  <body>
    <header class="toolbar">
      <button id="open" type="button">Open .hwp / .hwpx</button>
      <div class="pager" hidden>
        <button id="prev" type="button" aria-label="Previous page">‹</button>
        <span id="page-indicator" role="status" aria-live="polite"
          aria-atomic="true">Page – of –</span>
        <button id="next" type="button" aria-label="Next page">›</button>
      </div>
      <span id="status" class="status" role="status"></span>
    </header>
    <main id="viewer" class="viewer">
      <p class="placeholder">Open a Hancom document to view it.</p>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
