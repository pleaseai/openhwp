<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Defense-in-depth CSP. The rhwp engine is vendored locally (src/ui/vendor),
      so no third-party CDN is in the runtime trust path: script-src is 'self'
      plus 'wasm-unsafe-eval' (for the WASM engine) only. Dropping 'unsafe-inline'
      means inline event handlers in document-derived SVG cannot execute;
      style-src keeps 'unsafe-inline' for rendered SVG style attributes.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenHWP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="toolbar">
      <button id="open" type="button">Open .hwp / .hwpx</button>
      <div class="pager" hidden>
        <button id="prev" type="button" aria-label="Previous page">‹</button>
        <span id="page-indicator" role="status" aria-live="polite"
          aria-atomic="true">Page – of –</span>
        <button id="next" type="button" aria-label="Next page">›</button>
      </div>
      <span id="status" class="status" role="status"></span>
    </header>
    <main id="viewer" class="viewer">
      <p class="placeholder">Open a Hancom document to view it.</p>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
